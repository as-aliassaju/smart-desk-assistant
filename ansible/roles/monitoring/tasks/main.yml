---

- name: Install dependencies
  apt:
    name:
      - curl
      - apt-transport-https
    state: present
    update_cache: yes

- name: Install Helm
  shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Prometheus Helm repo
  command: helm repo add {{ helm_repo_name }} {{ helm_repo_url }}
  register: helm_repo_add
  changed_when: "'already exists' not in helm_repo_add.stderr"

- name: Update Helm repositories
  command: helm repo update

- name: Create monitoring namespace
  command: kubectl create namespace {{ namespace }}
  register: namespace_create
  failed_when: false
  changed_when: "'created' in namespace_create.stdout"

- name: Install Prometheus and Grafana
  command: >
    helm upgrade --install {{ release_name }}
    {{ helm_repo_name }}/{{ helm_chart }}
    --namespace {{ namespace }}